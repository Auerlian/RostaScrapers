<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosta — London Experience Finder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍝</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-bg: #531022;
      --brand-bg-alt: #48101E;
      --brand-bg-light: #5D1428;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-bg-hover: rgba(255, 255, 255, 0.08);
      --text-primary: #F4F0EC;
      --text-secondary: #D6D0CB;
      --text-muted: #B8ADA7;
      --border-soft: rgba(255, 255, 255, 0.15);
      --accent-primary: #BCC43E;
      --accent-hover: #AEB734;
      --accent-active: #9FA82E;
      --price-bg: rgba(188, 196, 62, 0.2);
      --price-text: #E8ECC8;
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 28px;
      --radius-xl: 36px;
      --radius-pill: 999px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--brand-bg);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: var(--brand-bg);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      text-transform: uppercase;
    }
    .logo span { color: var(--accent-primary); }
    .header-sub { 
      font-size: 13px; 
      color: var(--text-secondary); 
      font-weight: 500;
    }
    .header-meta { display: flex; align-items: center; gap: 16px; }
    .last-updated { 
      font-size: 12px; 
      color: var(--text-secondary);
      font-weight: 500;
    }
    .refresh-link {
      font-size: 12px;
      color: var(--accent-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(188, 196, 62, 0.3);
      transition: all 0.2s;
    }
    .refresh-link:hover { 
      background: rgba(188, 196, 62, 0.15);
      border-color: var(--accent-primary);
    }

    /* Provider Tabs */
    .tabs-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .tabs-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.2);
      padding: 6px;
      border-radius: var(--radius-pill);
    }
    .tab {
      padding: 10px 22px;
      border: none;
      background: transparent;
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab:hover { 
      color: var(--text-primary); 
      background: rgba(255,255,255,0.08); 
    }
    .tab.active { 
      background: var(--accent-primary); 
      color: var(--brand-bg); 
      box-shadow: 0 2px 8px rgba(188, 196, 62, 0.3);
    }

    /* Main Layout */
    .main {
      display: grid;
      grid-template-columns: 1fr 440px;
      gap: 24px;
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px 32px;
      height: calc(100vh - 80px);
    }

    /* Grid Panel */
    .grid-panel {
      overflow-y: auto;
      padding: 24px;
      border-radius: var(--radius-lg);
    }
    .grid-panel::-webkit-scrollbar { width: 8px; }
    .grid-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
    .grid-panel::-webkit-scrollbar-thumb { 
      background: rgba(188, 196, 62, 0.4); 
      border-radius: 4px; 
    }
    .grid-panel::-webkit-scrollbar-thumb:hover { 
      background: rgba(188, 196, 62, 0.6); 
    }

    .count-badge {
      display: inline-block;
      background: rgba(188, 196, 62, 0.15);
      color: var(--accent-primary);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      margin-bottom: 20px;
      border: 1px solid rgba(188, 196, 62, 0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
      gap: 16px;
    }

    /* Experience Card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .card:hover { 
      background: var(--card-bg-hover);
      border-color: rgba(188, 196, 62, 0.4);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: rgba(0,0,0,0.3);
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      height: 200px;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
    }

    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .card-provider {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-primary);
      margin-bottom: 6px;
    }
    .card-name { 
      font-size: 18px; 
      font-weight: 800; 
      margin-bottom: 10px; 
      line-height: 1.3;
      color: var(--text-primary);
    }
    .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 14px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }

    .card-price {
      display: inline-block;
      background: var(--price-bg);
      color: var(--price-text);
      font-size: 15px;
      font-weight: 800;
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      margin-bottom: 14px;
      border: 1px solid rgba(188, 196, 62, 0.3);
    }
    .card-price.no-price { 
      background: rgba(255, 255, 255, 0.05); 
      color: var(--text-muted);
      border-color: var(--border-soft);
    }

    .card-meta { 
      border-top: 1px solid var(--border-soft); 
      padding-top: 14px; 
      margin-top: auto; 
    }
    .card-meta-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .card-meta-row svg { flex-shrink: 0; margin-top: 2px; }
    .card-meta-row a { 
      color: var(--accent-primary); 
      text-decoration: none;
      font-weight: 600;
    }
    .card-meta-row a:hover { 
      color: var(--accent-hover);
      text-decoration: underline;
    }
    .card-location-extra { 
      font-size: 12px; 
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-links { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
    .card-link {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-soft);
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.03);
    }
    .card-link:hover { 
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: var(--brand-bg);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .footer a { 
      color: var(--accent-primary); 
      text-decoration: none;
      font-weight: 700;
    }
    .footer a:hover { 
      text-decoration: underline;
    }

    /* JSON Panel */
    .json-panel {
      background: var(--brand-bg-alt);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .json-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: var(--brand-bg);
      flex-wrap: wrap;
      gap: 12px;
    }
    .json-header-title { 
      font-size: 14px; 
      font-weight: 800; 
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .json-header-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: 8px;
    }
    .json-header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .json-copy-btn, .csv-download-btn {
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: var(--text-primary);
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .json-copy-btn:hover, .csv-download-btn:hover { 
      background: var(--accent-primary);
      color: var(--brand-bg);
      border-color: var(--accent-primary);
    }
    .json-copy-btn.copied { 
      border-color: #22c55e; 
      background: #22c55e;
      color: var(--brand-bg);
    }
    .csv-download-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .csv-download-btn:disabled:hover {
      background: rgba(0,0,0,0.2);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.2);
    }


    .json-content {
      flex: 1;
      overflow: auto;
      padding: 20px;
    }
    .json-content::-webkit-scrollbar { width: 8px; }
    .json-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
    .json-content::-webkit-scrollbar-thumb { 
      background: rgba(188, 196, 62, 0.4); 
      border-radius: 4px; 
    }
    .json-content::-webkit-scrollbar-thumb:hover { 
      background: rgba(188, 196, 62, 0.6); 
    }
    .json-content pre {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-all;
      overflow-wrap: break-word;
    }

    /* JSON syntax highlighting */
    .json-key { color: var(--accent-primary); }
    .json-string { color: #A8D5BA; }
    .json-number { color: #F4C095; }
    .json-null { color: #E89BA7; }
    .json-bracket { color: var(--text-secondary); }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      color: var(--text-secondary);
    }
    .spinner {
      width: 40px; 
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 1024px) {
      .main {
        grid-template-columns: 1fr;
        height: auto;
        padding: 20px;
      }
      /* JSON panel first on mobile */
      .json-panel { order: -1; height: 400px; }
      .grid-panel { order: 1; padding-right: 0; }
    }
    @media (max-width: 640px) {
      .header {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
        padding: 16px 20px;
      }
      .header-meta {
        flex-wrap: wrap;
        gap: 10px;
        width: 100%;
      }
      .tabs {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .tab { padding: 8px 16px; font-size: 13px; }
      .main { padding: 16px; gap: 16px; }
      .json-panel { height: 320px; }
      .json-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .json-header-actions {
        width: 100%;
        justify-content: flex-start;
      }
      .csv-download-btn, .json-copy-btn {
        font-size: 10px;
        padding: 6px 10px;
      }
      .grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .card-img, .card-img-placeholder { height: 160px; }
      .footer { padding: 20px; }
      .logo { font-size: 24px; }
      .header-sub { font-size: 12px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div>
        <div class="logo">Rosta<span>.</span></div>
        <div class="header-sub">London food &amp; drink experiences — live scraped data</div>
      </div>
    </div>
    <div class="header-meta">
      <span class="last-updated" id="last-updated"></span>
      <a class="refresh-link" href="https://github.com/Auerlian/RostaScrapers/actions/workflows/scrape.yml" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Run scrapers
      </a>
      <div class="tabs-wrapper">
        <span class="tabs-label">Providers</span>
        <div class="tabs" id="tabs"></div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="grid-panel" id="grid-panel">
      <div class="loading"><div class="spinner"></div><span>Loading experiences…</span></div>
    </div>
    <div class="json-panel">
      <div class="json-header">
        <span class="json-header-title">Pipeline Exports</span>
        <div class="json-header-actions">
          <button class="csv-download-btn" id="events-csv-btn" onclick="downloadPipelineCSV('events')" title="Download normalized events from pipeline (templates + occurrences)">📊 Events CSV</button>
          <button class="csv-download-btn" id="locations-csv-btn" onclick="downloadPipelineCSV('locations')" title="Download geocoded locations with coordinates for mapping">📍 Locations CSV</button>
          <button class="json-copy-btn" id="copy-btn" onclick="copyJson()">Copy JSON</button>
        </div>
      </div>
      <div class="json-content" id="json-content">
        <pre id="json-pre"></pre>
      </div>
    </div>
  </main>

  <footer class="footer">
    <a href="https://github.com/Auerlian/RostaScrapers" target="_blank" rel="noopener">Rosta</a> — automated experience data, refreshed daily via GitHub Actions
  </footer>

  <script>
    const PROVIDERS = [
      { id: 'pasta', name: 'Pasta Evangelists', file: 'pasta_evangelists_experiences.json' },
      { id: 'comptoir', name: 'Comptoir Bakery', file: 'comptoir_bakery_experiences.json' },
      { id: 'caravan', name: 'Caravan Coffee', file: 'caravan_coffee_school_experiences.json' },
    ];

    let allData = {};
    let activeProvider = 'pasta';

    // SVG icons (inline to avoid dependencies)
    const ICON = {
      pin: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
      mail: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
      globe: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
    };

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function highlightJson(json) {
      return json
        .replace(/("(?:\\.|[^"\\])*")\s*:/g, '<span class="json-key">$1</span>:')
        .replace(/:\s*("(?:\\.|[^"\\])*")/g, ': <span class="json-string">$1</span>')
        .replace(/:\s*(\d+(?:\.\d+)?)/g, ': <span class="json-number">$1</span>')
        .replace(/:\s*(null)/g, ': <span class="json-null">$1</span>')
        .replace(/[\[\]{}]/g, '<span class="json-bracket">$&</span>');
    }

    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.slice(0, len) + '…' : str;
    }

    function formatLocation(loc) {
      if (!loc) return '';
      if (typeof loc === 'string') return escapeHtml(truncate(loc, 80));
      if (Array.isArray(loc)) {
        const first = escapeHtml(truncate(loc[0], 80));
        if (loc.length > 1) return first + '<span class="card-location-extra"> + ' + (loc.length - 1) + ' more</span>';
        return first;
      }
      return '';
    }

    function renderCard(item) {
      const img = item.images && item.images.length > 0 && item.images[0]
        ? '<img class="card-img" src="' + escapeHtml(item.images[0]) + '" alt="' + escapeHtml(item.experience_name || '') + '" onerror="this.outerHTML=\'<div class=card-img-placeholder>Image unavailable</div>\'" loading="lazy">'
        : '<div class="card-img-placeholder">No image</div>';

      const priceClass = item.price ? 'card-price' : 'card-price no-price';
      const priceText = item.price || 'Price TBC';

      let metaHtml = '';
      if (item.detailed_location) {
        metaHtml += '<div class="card-meta-row">' + ICON.pin + '<span>' + formatLocation(item.detailed_location) + '</span></div>';
      }

      let linksHtml = '';
      if (item.email_contact) {
        linksHtml += '<a class="card-link" href="mailto:' + escapeHtml(item.email_contact) + '">' + ICON.mail + ' Email</a>';
      }
      if (item.website) {
        linksHtml += '<a class="card-link" href="' + escapeHtml(item.website) + '" target="_blank" rel="noopener">' + ICON.globe + ' Book / Website</a>';
      }

      return '<div class="card">'
        + img
        + '<div class="card-body">'
        + '<div class="card-provider">' + escapeHtml(item.experience_provider_name || '') + '</div>'
        + '<div class="card-name">' + escapeHtml(item.experience_name || 'Untitled') + '</div>'
        + '<div class="card-desc">' + escapeHtml(item.experience_description || 'No description available.') + '</div>'
        + '<span class="' + priceClass + '">' + escapeHtml(priceText) + '</span>'
        + '<div class="card-meta">'
        + metaHtml
        + (linksHtml ? '<div class="card-links">' + linksHtml + '</div>' : '')
        + '</div>'
        + '</div>'
        + '</div>';
    }

    function renderGrid(providerId) {
      const panel = document.getElementById('grid-panel');
      const data = allData[providerId] || [];

      if (data.length === 0) {
        panel.innerHTML = '<div class="loading"><span>No data loaded for this provider.</span></div>';
        return;
      }

      const badge = '<span class="count-badge">' + data.length + ' experience' + (data.length !== 1 ? 's' : '') + '</span>';
      const cards = data.map(renderCard).join('');
      panel.innerHTML = badge + '<div class="grid">' + cards + '</div>';
    }

    function renderJson(providerId) {
      const data = allData[providerId] || [];
      const raw = JSON.stringify(data, null, 2);
      document.getElementById('json-pre').innerHTML = highlightJson(escapeHtml(raw));
    }

    function switchProvider(id) {
      activeProvider = id;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
      renderGrid(id);
      renderJson(id);
    }

    function copyJson() {
      const data = allData[activeProvider] || [];
      const raw = JSON.stringify(data, null, 2);
      const btn = document.getElementById('copy-btn');
      navigator.clipboard.writeText(raw).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy JSON'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = raw;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy JSON'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // Build tabs
    function buildTabs() {
      const tabsEl = document.getElementById('tabs');
      tabsEl.innerHTML = PROVIDERS.map(p =>
        '<button class="tab' + (p.id === activeProvider ? ' active' : '') + '" data-id="' + p.id + '" onclick="switchProvider(\'' + p.id + '\')">' + escapeHtml(p.name) + '</button>'
      ).join('');
    }

    // Fetch last-updated time from GitHub API
    async function showLastUpdated() {
      try {
        const resp = await fetch('https://api.github.com/repos/Auerlian/RostaScrapers/commits?per_page=1&path=pasta_evangelists_experiences.json');
        if (!resp.ok) return;
        const commits = await resp.json();
        if (commits.length > 0) {
          const date = new Date(commits[0].commit.committer.date);
          document.getElementById('last-updated').textContent = 'Data updated ' + date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
      } catch (e) { /* silent */ }
    }

    // Load all JSON files
    async function loadAll() {
      buildTabs();
      showLastUpdated();
      const promises = PROVIDERS.map(async (p) => {
        try {
          const resp = await fetch(p.file);
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          allData[p.id] = await resp.json();
        } catch (e) {
          console.warn('Failed to load ' + p.file + ':', e);
          allData[p.id] = [];
        }
      });
      await Promise.all(promises);
      switchProvider(activeProvider);
    }

    loadAll();

    // Download pipeline-generated CSV files
    function downloadPipelineCSV(type) {
      let filename;
      if (type === 'events') {
        filename = 'events.csv';
      } else if (type === 'locations') {
        filename = 'locations.csv';
      } else if (type === 'events_sample') {
        filename = 'events_sample.csv';
      }
      
      const filepath = 'exports/' + filename;
      
      // Check if file exists by attempting to fetch it
      fetch(filepath)
        .then(response => {
          if (!response.ok) {
            throw new Error('File not found');
          }
          return response.blob();
        })
        .then(blob => {
          const link = document.createElement('a');
          const url = URL.createObjectURL(blob);
          
          link.setAttribute('href', url);
          link.setAttribute('download', filename);
          link.style.visibility = 'hidden';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
        })
        .catch(error => {
          alert('Pipeline CSV not found. Please run the pipeline first:\n\npython run_pipeline.py');
          console.error('Failed to download ' + filename + ':', error);
        });
    }
  </script>
</body>
