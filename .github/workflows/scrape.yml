name: Update experience data

on:
  schedule:
    # Runs daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          # Run full pipeline with geocoding and AI enrichment
          # Skip AI if no API key is set
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No OpenAI API key found, skipping AI enrichment"
            python run_pipeline.py run --skip-ai
          else
            echo "Running full pipeline with AI enrichment"
            python run_pipeline.py run
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all generated files
          git add data/current/*.json
          git add exports/*.csv
          git add cache/
          
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update scraped data and exports [automated]"
            git push
          fi
